<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>슬라이드 (발표용) — 청주김안과</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  body.slides-mode .lnb,
  body.slides-mode .toc { display: none !important; }
  body.slides-mode .main { margin-left: 0; max-width: 100%; padding: 0; }
  body.slides-mode { overflow: hidden; }

  :root { --slide-w: 1150px; }

  .s-agenda { display:grid; grid-template-columns: repeat(4,1fr); gap: 22px; width:100%; max-width: var(--slide-w); text-align:left; }
  .s-agenda-card { background:#161b22; border:1px solid #1f2633; border-left: 3px solid #4a9eff; border-radius: 14px; padding: 28px 26px 26px; display:flex; flex-direction:column; }
  body[data-theme="light"] .s-agenda-card { background:#fff; border-color:#e5e7eb; border-left-color:#2563eb; box-shadow: 0 1px 3px rgba(0,0,0,.05);}
  .s-agenda-head { display:flex; align-items:center; justify-content:space-between; margin-bottom: 22px; }
  .s-agenda-num { width: 34px; height: 34px; border-radius: 999px; background:#1e3a5f; color:#8fb8ff; font-size: 13px; font-weight: 800; display:flex; align-items:center; justify-content:center; }
  body[data-theme="light"] .s-agenda-num { background:#e0e7ff; color:#4338ca;}
  .s-agenda-icon { font-size: 26px; color:#4a9eff; }
  body[data-theme="light"] .s-agenda-icon { color:#2563eb;}
  .s-agenda-title { font-size: 19px; font-weight: 800; color:#e4e6eb; line-height: 1.4; padding-bottom: 18px; border-bottom: 1px solid #2a3142; margin-bottom: 14px; height: calc(19px * 1.4 * 2 + 18px); box-sizing: content-box; }
  body[data-theme="light"] .s-agenda-title { color:#1f2937; border-bottom-color:#e5e7eb;}
  .s-agenda-sub { font-size: 12.5px; color:#8b92a0; margin-top: auto; }

  .s-iconcard { background:#161b22; border:1px solid #1f2633; border-radius:14px; padding: 26px 26px 22px; text-align:left; }
  body[data-theme="light"] .s-iconcard { background:#fff; border-color:#e5e7eb; box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .s-iconcard-head { display:flex; align-items:center; gap:14px; padding-bottom:16px; border-bottom:1px solid #2a3142; margin-bottom:16px;}
  body[data-theme="light"] .s-iconcard-head { border-bottom-color:#e5e7eb;}
  .s-iconcard-ico { width:48px; height:48px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;}
  .s-iconcard-ico.red { background:#2d0f14; color:#ef4444;} body[data-theme="light"] .s-iconcard-ico.red { background:#fee2e2;}
  .s-iconcard-ico.orange { background:#2d1a0a; color:#f97316;} body[data-theme="light"] .s-iconcard-ico.orange { background:#ffedd5;}
  .s-iconcard-ico.purple { background:#1e1a3a; color:#a855f7;} body[data-theme="light"] .s-iconcard-ico.purple { background:#ede9fe;}
  .s-iconcard-label { font-size:11px; letter-spacing:1.5px; color:#8b92a0; font-weight:700;}
  .s-iconcard-title { font-size:20px; font-weight:800; color:#e4e6eb; margin-top:2px;}
  body[data-theme="light"] .s-iconcard-title { color:#111827;}
  .s-iconcard ul { list-style:none;}
  .s-iconcard li { position:relative; padding:5px 0 5px 12px; font-size:13.5px; color:#dfe2e8; line-height:1.6;}
  body[data-theme="light"] .s-iconcard li { color:#1f2937;}
  .s-iconcard li::before { content:"•"; position:absolute; left:0; color:#8b92a0;}

  .s-flow { display:flex; align-items:center; justify-content:center; gap:14px; margin-top:22px; flex-wrap:wrap;}
  .s-flow-pill { font-size:12.5px; color:#dfe2e8; background:#161b22; border:1px solid #2a3142; border-radius:999px; padding:6px 16px;}
  body[data-theme="light"] .s-flow-pill { background:#f3f4f6; border-color:#e5e7eb; color:#374151;}
  .s-flow-op { color:#8b92a0; font-weight:700;}
  .s-flow-result { color:#ef4444; font-weight:800; font-size:14px;}

  .stage { position: fixed; inset: 0; background: #0b0f15; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  body[data-theme="light"] .stage { background: #fcfcfd; }

  .slide { position: absolute; inset: 0; display: none; padding: 70px 90px 130px; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow-y: auto; }
  .slide.active { display: flex; animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .s-badge { display: inline-block; background: #1e3a5f; color: #4a9eff; font-size: 12px; font-weight: 800; padding: 7px 18px; border-radius: 999px; letter-spacing: 2px; margin-bottom: 26px; }
  body[data-theme="light"] .s-badge { background: #dbeafe; color: #2563eb; }

  .s-title { font-size: 56px; font-weight: 900; line-height: 1.25; margin-bottom: 28px; background: linear-gradient(90deg, #8fb8ff, #4a9eff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  body[data-theme="light"] .s-title { background: linear-gradient(90deg, #1e3a8a, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .s-subtitle { font-size: 20px; color: #dfe2e8; margin-bottom: 32px; font-weight: 500; }
  body[data-theme="light"] .s-subtitle { color: #4b5563; }

  .s-meta { font-size: 14px; color: #8b92a0; line-height: 1.9; }
  body[data-theme="light"] .s-meta { color: #6b7280; }
  .s-meta b { color: #e4e6eb; font-weight: 700; }
  body[data-theme="light"] .s-meta b { color: #111827; }

  .s-h2 { font-size: 38px; font-weight: 800; margin-bottom: 10px; color: #fff; }
  body[data-theme="light"] .s-h2 { color: #111827; }
  .s-lead { font-size: 17px; color: #8b92a0; margin-bottom: 30px; }
  body[data-theme="light"] .s-lead { color: #6b7280; }

  .s-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: var(--slide-w); text-align: left; }
  .s-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: var(--slide-w); text-align: left; }
  .s-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; width: 100%; max-width: var(--slide-w); text-align: left; }
  .s-grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; width: 100%; max-width: var(--slide-w); text-align: left; }

  .s-card { background: #161b22; border: 1px solid #1f2633; border-radius: 12px; padding: 22px; }
  body[data-theme="light"] .s-card { background: #fff; border-color: #e5e7eb; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
  .s-card.red { border-top: 4px solid #ef4444; }
  .s-card.blue { border-top: 4px solid #4a9eff; }
  .s-card.green { border-top: 4px solid #22c55e; }
  .s-card.orange { border-top: 4px solid #f97316; }
  .s-card.purple { border-top: 4px solid #a855f7; }

  .s-card h4 { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  body[data-theme="light"] .s-card h4 { color: #111827; }
  .s-card .sub { font-size: 12px; color: #8b92a0; font-weight: 600; margin-bottom: 10px; }
  .s-card ul { list-style: none; }
  .s-card li { position: relative; padding: 5px 0 5px 18px; font-size: 13.5px; color: #dfe2e8; line-height: 1.55; }
  body[data-theme="light"] .s-card li { color: #1f2937; }
  .s-card li::before { content: "›"; position: absolute; left: 0; color: #4a9eff; font-weight: 700; }

  .s-big-metric { font-size: 64px; font-weight: 900; line-height: 1; margin-bottom: 8px; text-align: center; }
  .s-big-metric.green { color: #22c55e; }
  .s-big-metric.blue { color: #4a9eff; }
  .s-big-metric.red { color: #ef4444; }
  .s-metric-label { font-size: 14px; font-weight: 700; text-align: center; color: #dfe2e8; }
  body[data-theme="light"] .s-metric-label { color: #111827; }
  .s-metric-desc { font-size: 12px; color: #8b92a0; margin-top: 6px; text-align: center; }

  .s-phase { background: #161b22; border: 1px solid #1f2633; border-radius: 10px; padding: 20px 14px; border-top: 3px solid #4a9eff; }
  body[data-theme="light"] .s-phase { background: #fff; border: 1px solid #e5e7eb; border-top: 3px solid #4a9eff; }
  .s-phase-no { font-size: 11px; color: #4a9eff; font-weight: 800; letter-spacing: 1px; text-align: center; }
  .s-phase-title { font-size: 16px; font-weight: 800; margin: 6px 0; color: #fff; text-align: center; }
  body[data-theme="light"] .s-phase-title { color: #111827; }
  .s-phase-week { font-size: 11px; color: #22c55e; background: #14532d; display: block; width: fit-content; margin: 0 auto 10px; padding: 3px 10px; border-radius: 999px; }
  body[data-theme="light"] .s-phase-week { background: #dcfce7; color: #15803d; }
  .s-phase ul { list-style: none; }
  .s-phase li { font-size: 12px; color: #dfe2e8; padding: 3px 0 3px 14px; position: relative; }
  body[data-theme="light"] .s-phase li { color: #1f2937; }
  .s-phase li::before { content: "✓"; position: absolute; left: 0; color: #22c55e; font-weight: 800; }

  .s-tbl { width: 100%; max-width: var(--slide-w); border-collapse: separate; border-spacing: 0; border: 1px solid #1f2633; border-radius: 10px; overflow: hidden; background: #161b22; text-align: left; }
  body[data-theme="light"] .s-tbl { background: #fff; border-color: #e5e7eb; }
  .s-tbl th, .s-tbl td { padding: 12px 18px; border-bottom: 1px solid #1f2633; font-size: 13.5px; }
  body[data-theme="light"] .s-tbl th, body[data-theme="light"] .s-tbl td { border-bottom-color: #e5e7eb; }
  .s-tbl thead th { background: #0f1419; color: #8b92a0; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  body[data-theme="light"] .s-tbl thead th { background: #f3f4f6; color: #6b7280; }
  .s-tbl td:first-child { font-weight: 700; width: 160px; color: #e4e6eb; }
  body[data-theme="light"] .s-tbl td:first-child { color: #111827; }
  .s-tbl .bef { color: #8b92a0; }
  .s-tbl .aft { color: #4a9eff; font-weight: 600; }
  body[data-theme="light"] .s-tbl .aft { color: #2563eb; }
  .s-tbl tbody tr:last-child td { border-bottom: 0; }

  .s-reason { display: flex; align-items: flex-start; gap: 16px; background: #161b22; border: 1px solid #1f2633; border-left: 4px solid #4a9eff; border-radius: 10px; padding: 18px 22px; margin-bottom: 12px; text-align: left; width: 100%; max-width: var(--slide-w); }
  body[data-theme="light"] .s-reason { background: #f5f9ff; border: 1px solid #dbeafe; border-left: 4px solid #2563eb; }
  .s-reason-icon { width: 40px; height: 40px; border-radius: 10px; background: #1e3a5f; color: #4a9eff; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  body[data-theme="light"] .s-reason-icon { background: #2563eb; color: #fff; }
  .s-reason-body { flex: 1; }
  .s-reason-title { font-size: 15px; font-weight: 800; color: #4a9eff; margin-bottom: 4px; }
  body[data-theme="light"] .s-reason-title { color: #2563eb; }
  .s-reason-text { font-size: 14px; color: #dfe2e8; line-height: 1.7; }
  body[data-theme="light"] .s-reason-text { color: #1f2937; }
  .s-reason-text .pill { display: inline-block; font-size: 12px; font-weight: 700; color: #4a9eff; background: #1c2838; padding: 2px 10px; border-radius: 999px; margin: 0 3px; }
  body[data-theme="light"] .s-reason-text .pill { background: #dbeafe; color: #2563eb; }
  .s-reason-metrics { display: flex; gap: 26px; margin-top: 8px; }
  .s-reason-metric b { font-size: 20px; font-weight: 900; color: #4a9eff; }
  body[data-theme="light"] .s-reason-metric b { color: #2563eb; }
  .s-reason-metric span { font-size: 12px; color: #8b92a0; margin-left: 6px; }

  .s-closing { margin-top: 24px; padding: 18px 28px; background: #1c2838; border: 1px solid #2a3f5f; border-radius: 10px; font-size: 16px; font-weight: 800; color: #fff; max-width: var(--slide-w); width: 100%; text-align: center; }
  body[data-theme="light"] .s-closing { background: #eff6ff; border-color: #bfdbfe; color: #1e3a8a; }

  .s-dual { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; width: 100%; max-width: var(--slide-w); }
  .s-dual-box { border-radius: 14px; padding: 26px 24px; text-align: left; }
  .s-dual-box.left { background: #0f1f3a; border: 1px solid #1e3a5f; }
  body[data-theme="light"] .s-dual-box.left { background: #eff6ff; border: 1px solid #dbeafe; }
  .s-dual-box.right { background: #2d0f14; border: 1px solid #5f1e1e; }
  body[data-theme="light"] .s-dual-box.right { background: #fef2f2; border: 1px solid #fecaca; }
  .s-dual-head { font-size: 17px; font-weight: 800; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
  .s-dual-box.left .s-dual-head { color: #4a9eff; }
  body[data-theme="light"] .s-dual-box.left .s-dual-head { color: #2563eb; }
  .s-dual-box.right .s-dual-head { color: #ef4444; }
  body[data-theme="light"] .s-dual-box.right .s-dual-head { color: #dc2626; }
  .s-dual-sub { font-size: 11px; color: #8b92a0; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 14px; }
  .s-dual-box ul { list-style: none; }
  .s-dual-box li { display: flex; align-items: flex-start; gap: 10px; padding: 9px 13px; margin-bottom: 7px; background: rgba(255,255,255,.04); border-radius: 8px; font-size: 13.5px; color: #dfe2e8; line-height: 1.55; }
  body[data-theme="light"] .s-dual-box li { background: #fff; color: #1f2937; }
  .s-dual-box.left li::before { content: "✓"; color: #4a9eff; font-weight: 900; flex-shrink: 0; }
  .s-dual-box.right li::before { content: "✕"; color: #ef4444; font-weight: 900; flex-shrink: 0; }
  .challenge-title { font-size: 17px; font-weight: 800; margin-bottom: 14px; color: #e6edf3; text-transform: none; letter-spacing: 0; }
  body[data-theme="light"] .challenge-title { color: #111827; }
  .sol-box { padding: 0 !important; overflow: hidden; }
  .sol-head { display:flex; align-items:center; gap:14px; padding:20px 24px; }
  .sol-head .sol-icon { width:46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .sol-head .sol-title { font-size:22px; font-weight:900; letter-spacing:.5px; line-height:1.1; }
  .sol-head .sol-sub { font-size:12px; color:#8b92a0; font-weight:700; margin-top:3px; }
  .sol-body { padding: 6px 24px 22px; }
  .sol-body ul { list-style:none; margin:0 0 14px; }
  .sol-body li { display:flex; align-items:flex-start; gap:10px; padding:8px 0; font-size:13.5px; color:#dfe2e8; }
  .sol-body li::before { content:"✓"; font-weight:900; flex-shrink:0; }
  .sol-divider { border-top:1px solid #2a3142; margin: 4px 0 14px; }
  body[data-theme="light"] .sol-divider { border-top-color:#e5e7eb; }
  .sol-label { font-size:11px; font-weight:800; color:#8b92a0; letter-spacing:1.2px; margin-bottom:10px; }
  .sol-chip { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.04); border:1px solid #2a3142; border-radius:8px; padding:10px 14px; margin-bottom:8px; font-size:13px; color:#dfe2e8; }
  body[data-theme="light"] .sol-chip { background:#f8fafc; border-color:#e5e7eb; color:#1f2937; }
  .sol-chip .tag { display:inline-block; font-size:11px; font-weight:800; padding:3px 10px; border-radius:999px; flex-shrink:0; }
  .sol-vision .sol-head { background:rgba(74,158,255,.12); }
  .sol-vision .sol-icon { background:rgba(74,158,255,.22); color:#4a9eff; }
  .sol-vision .sol-title { color:#4a9eff; }
  .sol-vision li::before { color:#4a9eff; }
  .sol-vision .tag { background:rgba(74,158,255,.18); color:#4a9eff; }
  .sol-insight .sol-head { background:rgba(168,85,247,.12); }
  .sol-insight .sol-icon { background:rgba(168,85,247,.22); color:#a855f7; }
  .sol-insight .sol-title { color:#a855f7; }
  .sol-insight li::before { color:#a855f7; }
  .sol-insight .tag { background:rgba(168,85,247,.18); color:#a855f7; }
  body[data-theme="light"] .sol-vision .sol-head { background:#eff6ff; }
  body[data-theme="light"] .sol-insight .sol-head { background:#f5f3ff; }
  .cmp-box { padding:0 !important; overflow:hidden; }
  .cmp-head { padding:26px 24px 20px; text-align:center; border-bottom:1px solid #2a3142; }
  body[data-theme="light"] .cmp-head { border-bottom-color:#e5e7eb; }
  .cmp-head .cmp-title { font-size:22px; font-weight:900; letter-spacing:.5px; }
  .cmp-head .cmp-sub { font-size:13px; color:#8b92a0; font-weight:600; margin-top:6px; }
  .cmp-body { padding:6px 24px 22px; }
  .cmp-row { display:grid; grid-template-columns: 80px 1fr; gap:14px; align-items:flex-start; padding:16px 4px; border-bottom:1px solid #2a3142; }
  body[data-theme="light"] .cmp-row { border-bottom-color:#eef2f7; }
  .cmp-row:last-child { border-bottom:none; }
  .cmp-row .cmp-label { font-size:12px; font-weight:800; color:#8b92a0; padding-top:2px; }
  .cmp-row .cmp-val { font-size:13.5px; color:#dfe2e8; line-height:1.6; }
  body[data-theme="light"] .cmp-row .cmp-val { color:#1f2937; }
  .cmp-old .cmp-head { background:rgba(148,163,184,.08); }
  .cmp-old .cmp-title { color:#e4e6eb; }
  body[data-theme="light"] .cmp-old .cmp-head { background:#f8fafc; }
  body[data-theme="light"] .cmp-old .cmp-title { color:#1f2937; }
  .cmp-new { border-color:#4a9eff !important; }
  .cmp-new .cmp-head { background:rgba(148,163,184,.08); border-bottom-color:#2a3142; }
  body[data-theme="light"] .cmp-new .cmp-head { background:#f8fafc; border-bottom-color:#e5e7eb; }
  .cmp-new .cmp-title { color:#e4e6eb; }
  body[data-theme="light"] .cmp-new .cmp-title { color:#1f2937; }
  body[data-theme="light"] .cmp-new { border-color:#4a9eff !important; }
  .flow-row { position:relative; background:#161b22; border:1px solid #1f2633; border-radius:14px; padding:34px 22px 22px; margin-bottom:18px; width:100%; max-width:var(--slide-w); }
  body[data-theme="light"] .flow-row { background:#fff; border-color:#e5e7eb; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .flow-row .flow-tag { position:absolute; top:-12px; left:22px; background:#4a9eff; color:#fff; font-size:12px; font-weight:800; padding:5px 14px; border-radius:999px; }
  .flow-grid { display:grid; grid-template-columns: 1fr 20px 1fr 20px 1fr; align-items:center; gap:0; }
  .flow-cell { background:#0f1f3a; border:1px solid #1e3a5f; border-radius:10px; padding:16px 18px; min-height:120px; display:flex; flex-direction:column; justify-content:center; }
  body[data-theme="light"] .flow-cell { background:#eff6ff; border-color:#dbeafe; }
  .flow-cell.center { align-items:center; text-align:center; }
  .flow-cell .fc-head { font-size:12.5px; font-weight:800; color:#93c5fd; margin-bottom:10px; }
  body[data-theme="light"] .flow-cell .fc-head { color:#2563eb; }
  .flow-cell ul { list-style:none; margin:0; }
  .flow-cell li { font-size:13px; color:#dfe2e8; padding:3px 0; display:flex; align-items:flex-start; gap:6px; }
  body[data-theme="light"] .flow-cell li { color:#1f2937; }
  .flow-cell li::before { content:"✓"; color:#4a9eff; font-weight:800; }
  .flow-cell .fc-icon { width:44px; height:44px; border-radius:10px; background:rgba(74,158,255,.22); display:flex; align-items:center; justify-content:center; font-size:22px; margin-bottom:10px; }
  .flow-cell .fc-title { font-size:14.5px; font-weight:800; color:#fff; line-height:1.4; }
  body[data-theme="light"] .flow-cell .fc-title { color:#111827; }
  .flow-cell .fc-sub { font-size:11.5px; color:#8b92a0; margin-top:4px; }
  .flow-arrow { height:2px; background:#4a9eff; position:relative; opacity:.5; }
  .flow-arrow::after { content:""; position:absolute; right:-2px; top:-4px; border-left:8px solid #4a9eff; border-top:5px solid transparent; border-bottom:5px solid transparent; }
  .arch-wrap { width:100%; max-width:var(--slide-w); display:grid; grid-template-columns: 1fr 30px 1fr; gap:0; align-items:stretch; }
  .arch-box { background:#0f1520; border:1px solid #1f2633; border-radius:14px; padding:22px 20px; position:relative; }
  body[data-theme="light"] .arch-box { background:#fafbfc; border-color:#e5e7eb; }
  .arch-title { font-size:13px; font-weight:800; color:#93c5fd; text-align:center; margin-bottom:14px; letter-spacing:.5px; }
  body[data-theme="light"] .arch-title { color:#2563eb; }

<body class="slides-mode">
<script>window.CURRENT_PAGE = 'slides';</script>
<script src="assets/layout.js" data-base="./"></script>

<div class="slide-indicator">LOOCUS VISION / 차세대 CRM 도입 제안</div>

<div class="stage">

  <div id="slides-container"></div>

</div>

<div class="nav-bar">
  <button class="nav-btn icon-only" id="navPrev" title="이전 (←)">◀</button>
  <div class="nav-counter" id="navCounter"><input id="navInput" type="number" min="1" value="1" style="width:36px;background:transparent;border:none;color:inherit;font:inherit;text-align:right;outline:none;-moz-appearance:textfield"> / <span id="navTotal">32</span></div>
  <button class="nav-btn icon-only" id="navNext" title="다음 (→)">▶</button>
  <button class="nav-btn" id="navFull" title="전체화면 (F)">⛶ Full</button>
  <a class="nav-btn" href="/" title="홈">⌂ Home</a>
</div>

<script>
  // NOTE: This page loads slide fragments via fetch() — must be served over http(s), not file://
  (async () => {
    const container = document.getElementById('slides-container');
    const total = 33;
    const parts = [];
    for (let i = 1; i <= total; i++) {
      const name = `slides/slide-${String(i).padStart(2, '0')}.html`;
      const res = await fetch(name);
      parts.push(await res.text());
    }
    container.innerHTML = parts.join('\n');

    const slides = document.querySelectorAll('.slide');
    const total2 = slides.length;
    let idx = 0;
    const navInput = document.getElementById('navInput');
    const navTotal = document.getElementById('navTotal');
    navTotal.textContent = total2;
    navInput.max = total2;

    function show(n) {
      idx = (n + total2) % total2;
      slides.forEach((s, i) => s.classList.toggle('active', i === idx));
      navInput.value = idx + 1;
    }
    navInput.addEventListener('change', () => {
      const v = parseInt(navInput.value, 10);
      if (!isNaN(v)) show(v - 1);
    });
    navInput.addEventListener('keydown', (e) => e.stopPropagation());
    document.getElementById('navPrev').onclick = () => show(idx - 1);
    document.getElementById('navNext').onclick = () => show(idx + 1);
    document.getElementById('navFull').onclick = () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    };
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); show(idx + 1); }
      else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); show(idx - 1); }
      else if (e.key === 'f' || e.key === 'F') document.getElementById('navFull').click();
      else if (e.key === 'Home') show(0);
      else if (e.key === 'End') show(total2 - 1);
    });
    show(0);
  })();
</script>
</body>
</html>
